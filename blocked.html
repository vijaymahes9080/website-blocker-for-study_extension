<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode Active</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            text-align: center;
            user-select: none;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .quote-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 2rem;
            position: relative;
        }

        .quote-text {
            font-size: 1.5rem;
            font-style: italic;
            font-weight: 300;
            line-height: 1.4;
        }

        .quote-author {
            margin-top: 15px;
            display: block;
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Stay Focused.</h1>
        <p>This site is blocked while you are studying.</p>

        <div class="quote-box">
            <span class="quote-text" id="quote">"The secret of getting ahead is getting started."</span>
            <span class="quote-author" id="author">- Mark Twain</span>
        </div>

        <a href="javascript:history.back()" class="btn">Go Back</a>
    </div>

    <script>
        const quotes = [
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Quality is not an act, it is a habit.", author: "Aristotle" },
            { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
            { text: "Education is the passport to the future, for tomorrow belongs to those who prepare for it today.", author: "Malcolm X" },
            { text: "Focus entirely on the only thing you can control: yourself.", author: "Unknown" },
            { text: "Discipline is doing what needs to be done, even if you don't want to do it.", author: "Unknown" }
        ];

        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quote').textContent = `"${randomQuote.text}"`;
        document.getElementById('author').textContent = `- ${randomQuote.author}`;

        // Parse query parameter for the blocked URL
        const urlParams = new URLSearchParams(window.location.search);
        const blockedUrl = urlParams.get('url');
        if (blockedUrl) {
            document.querySelector('.container p').innerHTML = `The site <strong>${blockedUrl}</strong> is blocked while you are studying.`;
        }
    </script>
</body>

</html>
