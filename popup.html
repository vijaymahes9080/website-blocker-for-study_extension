<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFocus</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="chrome-polyfill.js"></script>
</head>

<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <span class="icon">🎓</span> EduFocus
      </div>
      <button id="settingsBtn" class="icon-btn" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </button>
    </header>

    <main id="mainView">
      <div class="timer-display">
        <svg class="progress-ring" width="180" height="180">
          <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent"
            r="80" cx="90" cy="90" />
          <circle class="progress-ring__circle" stroke="#4f46e5" stroke-width="8" fill="transparent" r="80" cx="90"
            cy="90" />
        </svg>
        <div class="time-text">
          <h1 id="timer">25:00</h1>
          <p id="timerLabel">Focus Time</p>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="primary-btn">Start Focus</button>
        <button id="resetBtn" class="secondary-btn" style="display: none;">End Session</button>
      </div>

      <div class="stats-mini">
        <div class="stat">
          <span class="stat-value" id="sessionsToday">0</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="hoursToday">0h</span>
          <span class="stat-label">Focused</span>
        </div>
      </div>
    </main>

    <div id="settingsView" class="hidden">
      <div class="view-header">
        <button id="backBtn" class="icon-btn-small">←</button>
        <h2 id="settingsTitle">Website Manager</h2>
      </div>

      <div class="mode-toggle-container">
        <label class="switch">
          <input type="checkbox" id="modeToggle">
          <span class="slider round"></span>
        </label>
        <div class="mode-labels">
          <span id="modeLabel">Block Mode</span>
          <p id="modeDescription" class="mode-desc">Blocks listed sites</p>
        </div>
      </div>

      <div class="input-group">
        <input type="text" id="newSiteInput" placeholder="example.com">
        <button id="addSiteBtn" class="icon-btn-add">+</button>
      </div>

      <ul id="siteList" class="site-list">
        <!-- List items injected by JS -->
      </ul>

      <div class="tips">
        <p id="tipText">💡 Tip: Add social media and entertainment sites here.</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
